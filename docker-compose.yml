services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vllm_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vllm_network

  backend:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8088:8080"
    volumes:
      - hf_cache:${HF_CACHE_DIR:-/home/vllm/.cache/huggingface}
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >-
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers 4"
    networks:
      - vllm_network

  queue-worker:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    env_file: .env
    volumes:
      - hf_cache:${HF_CACHE_DIR:-/home/vllm/.cache/huggingface}
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.queue_worker
    networks:
      - vllm_network

  metrics-worker:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    env_file: .env
    volumes:
      - hf_cache:${HF_CACHE_DIR:-/home/vllm/.cache/huggingface}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.metrics_worker
    networks:
      - vllm_network

  frontend:
    build:
      context: ./frontend
      target: runtime
    restart: unless-stopped
    ports:
      - "127.0.0.1:5180:80"
    networks:
      - vllm_network

volumes:
  pgdata:
  redisdata:
  hf_cache:

networks:
  vllm_network:
    driver: bridge
