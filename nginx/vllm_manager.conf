# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name llm.liaufms.org;

    location / {
        return 301 https://llm.liaufms.org$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name llm.liaufms.org;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/llm.liaufms.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llm.liaufms.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Proxy to vLLM via backend (inference endpoints) ───────────────────────
    # All inference traffic MUST go through the backend proxy — never directly
    # to any vLLM container port. vLLM containers bind to 127.0.0.1 ONLY.
    location /v1/ {
        proxy_pass         http://127.0.0.1:8088/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Streaming / long inference support
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         660s;
        proxy_send_timeout         660s;
        proxy_connect_timeout      10s;
        chunked_transfer_encoding  on;
    }

    # ── Proxy to backend API ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8088/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ── Frontend app (proxied to Docker frontend service) ────────────────────
    location ~* \.(js|css|woff2?|png|ico|svg)$ {
        proxy_pass         http://127.0.0.1:5180;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        expires            1y;
        add_header         Cache-Control "public, immutable" always;
    }

    location / {
        proxy_pass         http://127.0.0.1:5180;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        add_header         Cache-Control "public, max-age=0, must-revalidate" always;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/vllm_manager_access.log;
    error_log   /var/log/nginx/vllm_manager_error.log warn;
}
